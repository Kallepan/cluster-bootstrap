# # Description: Main tasks file for the talos role.
# ---
- name: Include Fetch Image
  ansible.builtin.include_tasks: fetch_image.yml

- name: Check if talosconfig is present
  ansible.builtin.stat:
    path: "{{ talos_clusters[0].output_dir }}/configs/talosconfig"
  register: talosconfig_file

- name: Include Setup Tasks
  ansible.builtin.include_tasks: setup.yml
  loop: "{{ talos_clusters }}"
  loop_control:
    loop_var: talos_cluster
  when: talos_cluster.run_setup | default(false)

- name: Include Install Cilium
  ansible.builtin.include_tasks: install-cilium.yml
  loop: "{{ talos_clusters }}"
  loop_control:
    loop_var: talos_cluster
  when: talos_cluster.install_cilium | default(false)

- name: Include Install ArgoCD
  ansible.builtin.include_tasks: install-argocd.yml
  loop: "{{ talos_clusters }}"
  loop_control:
    loop_var: talos_cluster
  when: talos_cluster.install_argocd | default(false)

- name: Include Talos Upgrade
  ansible.builtin.include_tasks: talos-upgrade.yml
  loop: "{{ talos_clusters }}"
  loop_control:
    loop_var: talos_cluster
  when: talosconfig_file.stat.exists and talos_cluster.upgrade_talos

- name: Include K8S Upgrade
  ansible.builtin.include_tasks: k8s-upgrade.yml
  loop: "{{ talos_clusters }}"
  loop_control:
    loop_var: talos_cluster
  when: talosconfig_file.stat.exists and talos_cluster.upgrade_k8s
