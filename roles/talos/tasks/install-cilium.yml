- name: Add Cilium Helm Repository
  ansible.builtin.shell: |
    set -euo pipefail
    helm repo add cilium https://helm.cilium.io/ --force-update
  register: cilium_repo_result
  changed_when: cilium_repo_result.stdout is search("has been added|has been updated")
  when: not ansible_check_mode

- name: Wait for Kubernetes API Server
  ansible.builtin.wait_for:
    host: "{{ talos_cluster.endpoint }}"
    port: 6443
    delay: 10
    timeout: 300
  changed_when: false

- name: Install Cilium
  ansible.builtin.shell: |
    set -euo pipefail
    helm upgrade --install cilium cilium/cilium \
      --version {{ talos_cilium_version }} \
      --namespace kube-system \
      --create-namespace \
      --kubeconfig {{ talos_cluster.output_dir }}/configs/kubeconfig \
      --values {{ role_path }}/files/cilium-values.yaml \
      --set-string cluster.name={{ talos_cluster.name }} \
      --set cluster.id={{ talos_cluster.id }}
  register: cilium_install_result
  changed_when: cilium_install_result.stdout is search("has been installed|has been upgraded")
  when: not ansible_check_mode
