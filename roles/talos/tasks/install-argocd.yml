- name: Wait for Kubernetes API Server
  ansible.builtin.wait_for:
    host: "{{ talos_cluster.endpoint }}"
    port: 6443
    delay: 10
    timeout: 300
  changed_when: false

- name: Install ArgoCD
  ansible.builtin.shell: |
    set -euo pipefail
    helm upgrade --install argocd oci://ghcr.io/argoproj/argo-helm/argo-cd \
      --version 9.4.10 \
      --namespace argocd \
      --create-namespace \
      --kubeconfig {{ talos_cluster.output_dir }}/configs/kubeconfig \
      --values {{ role_path }}/files/argocd-values.yaml \
      --set-string global.domain={{ talos_cluster.endpoint }}
  register: argocd_install_result
  changed_when: argocd_install_result.stdout is search("has been installed|has been upgraded")
  when: not ansible_check_mode
