cluster:
    name: "service"
    id: 2
cni:
    exclusive: false
ipam:
    mode: "kubernetes"
kubeProxyReplacement: true
l2announcements:
    enabled: true
k8sServiceHost: "127.0.0.1"
k8sServicePort: "6443"
k8sClientRateLimit:
    qps: 5
    burst: 10
externalIPs:
    enabled: true
securityContext:
    capabilities:
        ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
        cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE
cgroup:
    autoMount:
        enabled: false
    hostRoot: "/sys/fs/cgroup"
k8sServiceHost: localhost
k8sServicePort: 7445
gatewayAPI:
    enabled: true
    enableAlpn: true
    enableAppProtocol: true