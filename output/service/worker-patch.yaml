machine:
  install:
    disk: /dev/sda

  sysctls:
    vm.nr_hugepages: "1024"

  kubelet:
    extraMounts:
      - destination: /var/lib/rook
        type: bind
        source: /var/lib/rook
        options:
          - rbind
          - rshared
          - rw
      - destination: /var/local
        type: bind
        source: /var/local
        options:
          - rbind
          - rshared
          - rw
